; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
  +<main.cpp>
  -<gps_scan_test.cpp>
  -<serial_pin_scan.cpp>
  -<hardware_self_test.cpp>
  -<serial_min_test.cpp>
lib_deps =
  mikalhart/TinyGPSPlus @ ^1.1.0
  bblanchon/ArduinoJson @ ^7.0.4
  fastled/FastLED @ ^3.7.8

[env:esp32-c3-audio]
extends = env:esp32-c3
build_flags =
  ${env:esp32-c3.build_flags}
  -D ENABLE_AUDIO_PROMPT=1

[env:gps_test]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_src_filter =
  +<gps_scan_test.cpp>
  -<main.cpp>
  -<serial_pin_scan.cpp>
  -<hardware_self_test.cpp>
  -<serial_min_test.cpp>
lib_deps =
  mikalhart/TinyGPSPlus @ ^1.1.0

[env:serial_scan]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_src_filter =
  +<serial_pin_scan.cpp>
  -<main.cpp>
  -<gps_scan_test.cpp>
  -<hardware_self_test.cpp>
  -<serial_min_test.cpp>

[env:hardware_test]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_src_filter =
  +<hardware_self_test.cpp>
  -<main.cpp>
  -<gps_scan_test.cpp>
  -<serial_pin_scan.cpp>
  -<serial_min_test.cpp>
lib_deps =
  mikalhart/TinyGPSPlus @ ^1.1.0
  fastled/FastLED @ ^3.7.8

[env:hardware_test_builtin]
extends = env:hardware_test
build_flags =
  -D USE_BUILTIN_STATUS_LED=1

[env:serial_min]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter =
  +<serial_min_test.cpp>
  -<main.cpp>
  -<gps_scan_test.cpp>
  -<serial_pin_scan.cpp>
  -<hardware_self_test.cpp>
